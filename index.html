<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Arrow Tap Escape</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{height:100vh;background:#fff;overflow:hidden}
.phone{width:100vw;max-width:520px;height:100vh;margin:auto;background:#fff;display:flex;flex-direction:column}
.top{height:82px;background:#deddf4;display:flex;align-items:center;justify-content:center;gap:70px}
.circle{width:42px;height:42px;border:0;border-radius:50%;background:#adb1c9;font-size:22px}
.level{background:#aaaec6;color:#fff;text-align:center;border-radius:6px;padding:6px 25px;font-weight:900;text-shadow:1px 1px #000}
.hearts{color:#ef123d;font-size:18px}
.tip{margin:8px auto;width:175px;border:2px solid #d5e0ff;border-radius:8px;padding:7px;text-align:center;font-weight:800}
.stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.grid{position:relative;width:min(78vw,390px);height:min(78vw,390px)}
.dot{position:absolute;width:4px;height:4px;background:#888;border-radius:50%}
.arrow{position:absolute;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;cursor:pointer;transition:.28s}
.arrow.bad{animation:shake .22s linear 2}
@keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}
.footer{height:86px;background:#deddf4;display:flex;align-items:center;justify-content:center;gap:10px}
.btn{border:0;border-radius:12px;padding:13px 18px;font-weight:900;background:#ffd43b}
.blue{background:#4dabf7;color:white}.red{background:#ff6b6b;color:white}
.modal,.levels{position:absolute;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:20}
.box{background:white;border-radius:22px;padding:22px;text-align:center;width:86%;max-width:360px}
.levels{background:white;align-items:flex-start;overflow:auto;padding:16px}
.levelGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;margin-top:12px}
.levelGrid button{padding:12px;border:1px solid #ddd;border-radius:10px;background:#fff;font-weight:800}
.lock{opacity:.35}
</style>
</head>
<body>
<div class="phone">
  <div class="top">
    <button class="circle" onclick="openLevels()">☰</button>
    <div class="level">Level <span id="level">1</span><div class="hearts" id="hearts">♥♥♥</div></div>
    <button class="circle" onclick="restart()">⚙</button>
  </div>
  <div class="tip" id="tip">Tap Arrow</div>
  <div class="stage">
    <div class="grid" id="grid"></div>
    <div class="modal" id="modal"><div class="box">
      <h2 id="mt">Level Clear!</h2><p id="md">All arrows escaped.</p><br>
      <button class="btn blue" onclick="nextLevel()">Next Level</button>
    </div></div>
    <div class="levels" id="levels"><div style="width:100%">
      <h2>500 Levels</h2><div class="levelGrid" id="levelGrid"></div><br>
      <button class="btn red" onclick="closeLevels()" style="width:100%">Back</button>
    </div></div>
  </div>
  <div class="footer">
    <button class="btn red" onclick="restart()">Retry</button>
    <button class="btn blue" onclick="hint()">Hint</button>
    <button class="btn" onclick="openLevels()">Levels</button>
  </div>
</div>

<script>
const grid=document.getElementById("grid");
let saved=JSON.parse(localStorage.getItem("arrowTapEscape")||"{}");
let level=saved.level||1, unlocked=saved.unlocked||1, hp=3, arrows=[], busy=false;
const N=7, dirs={up:[0,-1,"↑"],right:[1,0,"→"],down:[0,1,"↓"],left:[-1,0,"←"]};

function save(){localStorage.setItem("arrowTapEscape",JSON.stringify({level,unlocked}))}
function rnd(seed){let x=Math.sin(seed)*10000;return x-Math.floor(x)}

function generate(lv){
  let arr=[], seed=lv*7919, count=Math.min(34,7+Math.floor(lv/3));
  let names=["up","right","down","left"];
  for(let i=0;i<count;i++){
    let x=Math.floor(rnd(seed+i*13)*N), y=Math.floor(rnd(seed+i*17)*N);
    if(arr.some(a=>a.x==x&&a.y==y)){i--;continue}
    arr.push({x,y,d:names[Math.floor(rnd(seed+i*23)*4)],id:i});
  }
  if(lv===1)arr=[{x:0,y:4,d:"right",id:1},{x:3,y:4,d:"down",id:2},{x:4,y:2,d:"up",id:3}];
  return arr;
}

function cellSize(){return grid.clientWidth/N}

function draw(){
  grid.innerHTML="";
  let s=cellSize();
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    let d=document.createElement("div");
    d.className="dot";
    d.style.left=x*s+s/2-2+"px";
    d.style.top=y*s+s/2-2+"px";
    grid.appendChild(d);
  }
  arrows.forEach(a=>{
    let el=document.createElement("div");
    el.className="arrow";
    el.textContent=dirs[a.d][2];
    el.dataset.id=a.id;
    el.style.left=a.x*s+s/2-17+"px";
    el.style.top=a.y*s+s/2-17+"px";
    el.onclick=()=>tapArrow(a.id);
    grid.appendChild(el);
  });
}

function load(){
  hp=3;busy=false;arrows=generate(level);
  document.getElementById("level").textContent=level;
  document.getElementById("hearts").textContent="♥♥♥";
  document.getElementById("tip").textContent="Tap Arrow";
  document.getElementById("modal").style.display="none";
  draw();
}

function tapArrow(id){
  if(busy)return;
  let a=arrows.find(x=>x.id==id);
  let [dx,dy]=dirs[a.d];
  let blocked=arrows.find(b=>b.id!==a.id && sameLine(a,b,dx,dy));
  let el=[...document.querySelectorAll(".arrow")].find(e=>+e.dataset.id===id);

  if(blocked){
    hp--;
    document.getElementById("hearts").textContent="♥".repeat(hp);
    document.getElementById("tip").textContent="Blocked! Arrow came back";
    el.classList.add("bad");
    setTimeout(()=>el.classList.remove("bad"),500);
    if(hp<=0)setTimeout(()=>show("Game Over","Retry level."),300);
    return;
  }

  busy=true;
  let s=cellSize(), dist=N*s*1.2;
  el.style.transform=`translate(${dx*dist}px,${dy*dist}px)`;
  el.style.opacity="0";

  setTimeout(()=>{
    arrows=arrows.filter(x=>x.id!==id);
    busy=false;
    draw();
    document.getElementById("tip").textContent=arrows.length+" arrows left";
    if(arrows.length===0)clearLevel();
  },280);
}

function sameLine(a,b,dx,dy){
  if(dx!==0) return b.y===a.y && ((dx>0&&b.x>a.x)||(dx<0&&b.x<a.x));
  return b.x===a.x && ((dy>0&&b.y>a.y)||(dy<0&&b.y<a.y));
}

function clearLevel(){
  unlocked=Math.max(unlocked,level+1);
  save();
  show("Level Clear!","Next level unlocked.");
}

function show(t,d){
  document.getElementById("mt").textContent=t;
  document.getElementById("md").textContent=d;
  document.getElementById("modal").style.display="flex";
}

function nextLevel(){
  if(level<500)level++;
  unlocked=Math.max(unlocked,level);
  save();
  load();
}

function restart(){load()}
function hint(){document.getElementById("tip").textContent="Find arrow with no arrow in front."}

function openLevels(){
  const lg=document.getElementById("levelGrid");
  lg.innerHTML="";
  for(let i=1;i<=500;i++){
    let b=document.createElement("button");
    b.textContent=i;
    if(i>unlocked)b.className="lock";
    b.onclick=()=>{if(i<=unlocked){level=i;save();closeLevels();load()}};
    lg.appendChild(b);
  }
  document.getElementById("levels").style.display="flex";
}
function closeLevels(){document.getElementById("levels").style.display="none"}

window.addEventListener("resize",draw);
load();
</script>
</body>
</html>
