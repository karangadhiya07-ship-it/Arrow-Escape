<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Arrow Escape India Level</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{height:100vh;background:#fff;overflow:hidden;color:#111735}
.game{max-width:520px;height:100vh;margin:auto;background:#fff;display:flex;flex-direction:column}
.top{height:86px;background:#deddf4;display:flex;align-items:center;justify-content:center;gap:24px}
.round{width:44px;height:44px;border:0;border-radius:50%;background:#b8bbd4;font-size:22px;font-weight:900}
.level{min-width:220px;background:#aeb1ca;color:#fff;border-radius:8px;padding:7px 10px;text-align:center;font-weight:900;text-shadow:1px 1px #000}
.hearts{color:#f0183c;font-size:18px;letter-spacing:3px;margin-top:2px}
.tip{margin:10px auto 0;width:250px;border:2px solid #d7e2ff;border-radius:10px;padding:8px;text-align:center;font-weight:900}
.stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.board{width:min(94vw,470px);height:min(94vw,470px);position:relative}
.arrow{position:absolute;display:flex;align-items:center;justify-content:center;font-weight:900;line-height:1;cursor:pointer;transition:.22s;color:#111735;user-select:none}
.arrow.bad{animation:shake .22s linear 2}
@keyframes shake{25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
.footer{height:84px;background:#deddf4;display:flex;align-items:center;justify-content:center;gap:10px}
.btn{border:0;border-radius:14px;padding:12px 18px;font-weight:900;background:#ffd43b;color:#1b1b1b}
.blue{background:#4dabf7;color:#fff}.red{background:#ff6b6b;color:#fff}
.modal{position:absolute;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:20}
.box{background:#fff;border-radius:22px;padding:24px;text-align:center;width:88%;max-width:370px}
</style>
</head>
<body>
<div class="game">
  <div class="top">
    <button class="round" onclick="restart()">↻</button>
    <div class="level">Level <span id="levelText">1 - India</span><div class="hearts" id="hearts">♥♥♥</div></div>
    <button class="round" onclick="hint()">💡</button>
  </div>

  <div class="tip" id="tip">India Map • Tap outer arrows</div>

  <div class="stage">
    <div class="board" id="board"></div>
    <div class="modal" id="modal">
      <div class="box">
        <h2 id="mt">Level Clear!</h2>
        <p id="md">India level complete.</p><br>
        <button class="btn blue" onclick="restart()">Play Again</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn red" onclick="restart()">Retry</button>
    <button class="btn blue" onclick="hint()">Hint</button>
  </div>
</div>

<script>
const board=document.getElementById("board");
const N=40;
const dirs={up:[0,-1,"↑"],right:[1,0,"→"],down:[0,1,"↓"],left:[-1,0,"←"]};
let hp=3, arrows=[], busy=false;

const indiaMask=[
  ".......XXXXX............................",
  ".......XXXXXXXXXX.......................",
  ".......XXXXXXXXXX.......................",
  "........XXXXXXXXX.......................",
  "........XXXXXXXX........................",
  "........XXXXXXXXX.......................",
  "........XXXXXXXX........................",
  ".........XXXXXXXX.................XXX...",
  ".........XXXXXXXXX..............XXXXXX..",
  "........XXXXXXXXXXX.............XXXXXX..",
  "........XXXXXXXXXX........XX..XXXXXXXX..",
  ".......XXXXXXXXXXXXX......XX..XXXXXXX...",
  "....XXXXXXXXXXXXXXXXXXXX..XXXXXXXXXX....",
  "...XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX....",
  "...XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX....",
  "....XXXXXXXXXXXXXXXXXXXXXXXXX.XXXXXX....",
  ".....XXXXXXXXXXXXXXXXXXXXXXXX.XXXXX.....",
  "..XXXXXXXXXXXXXXXXXXXXXXXXXXX..XXXX.....",
  "..XXXXXXXXXXXXXXXXXXXXXXXXXXXX...XX.....",
  "..XXXXXXXXXXXXXXXXXXXXXXXXXXXX..........",
  "...XXXXXXXXXXXXXXXXXXXXXXXXXX...........",
  "...XXXXXXXXXXXXXXXXXXXXXXXX.............",
  "....XXXXXXXXXXXXXXXXXXXXXXX.............",
  ".....XX.XXXXXXXXXXXXXXXXXX..............",
  "........XXXXXXXXXXXXXXXXX...............",
  "........XXXXXXXXXXXXXXXX................",
  "........XXXXXXXXXXXXXXX.................",
  "........XXXXXXXXXXXXXX..................",
  "........XXXXXXXXXXXXX...................",
  ".........XXXXXXXXXXX....................",
  ".........XXXXXXXXXX.....................",
  "..........XXXXXXXXXX....................",
  "..........XXXXXXXXXX....................",
  "...........XXXXXXXXX....................",
  "...........XXXXXXXX.....................",
  "............XXXXXXXX....................",
  "............XXXXXXXX....................",
  ".............XXXXXX.....................",
  ".............XXXXXX.....................",
  "..............XXX......................."
];

function rnd(seed){let x=Math.sin(seed)*10000;return x-Math.floor(x)}

function inIndia(x,y){
  return indiaMask[y] && indiaMask[y][x]==="X";
}

function outward(x,y){
  let c=(N-1)/2, dx=x-c, dy=y-c;
  if(Math.abs(dx)>=Math.abs(dy)) return dx>=0?"right":"left";
  return dy>=0?"down":"up";
}

function generate(){
  let arr=[], id=0, seed=101;

  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){
      if(!inIndia(x,y)) continue;

      // 200-300 arrows approx, keeping India shape clear
      if(rnd(seed+x*31+y*37)>0.72) continue;

      let d=outward(x,y);

      // inner arrows thoda random for puzzle
      if(x>4&&x<N-5&&y>4&&y<N-5&&rnd(seed+x*17+y*23)>0.82){
        let all=["up","right","down","left"];
        d=all[Math.floor(rnd(seed+x*13+y*29)*4)];
      }

      arr.push({x,y,d,id:id++});
    }
  }
  return arr;
}

function cell(){return board.clientWidth/N}

function load(){
  hp=3; busy=false; arrows=generate();
  document.getElementById("hearts").innerText="♥♥♥";
  document.getElementById("tip").innerText="India Map • "+arrows.length+" arrows";
  document.getElementById("modal").style.display="none";
  draw();
}

function draw(){
  board.innerHTML="";
  let s=cell();

  arrows.forEach(a=>{
    let e=document.createElement("div");
    e.className="arrow";
    e.innerText=dirs[a.d][2];
    e.dataset.id=a.id;

    let length=9+Math.floor(rnd(999+a.x*31+a.y*17)*8);
    let size=Math.max(9,Math.min(17,length));
    e.style.fontSize=size+"px";
    e.style.width=length+"px";
    e.style.height=length+"px";
    e.style.left=a.x*s+s/2-length/2+"px";
    e.style.top=a.y*s+s/2-length/2+"px";

    e.onclick=()=>tap(a.id);
    board.appendChild(e);
  });
}

function isBlocked(a,b,dx,dy){
  if(dx!==0) return b.y===a.y && ((dx>0&&b.x>a.x)||(dx<0&&b.x<a.x));
  return b.x===a.x && ((dy>0&&b.y>a.y)||(dy<0&&b.y<a.y));
}

function tap(id){
  if(busy)return;
  let a=arrows.find(v=>v.id===id);
  if(!a)return;

  let [dx,dy]=dirs[a.d];
  let blocked=arrows.find(b=>b.id!==a.id && isBlocked(a,b,dx,dy));
  let el=[...document.querySelectorAll(".arrow")].find(e=>+e.dataset.id===id);

  if(blocked){
    hp--;
    document.getElementById("hearts").innerText="♥".repeat(hp);
    document.getElementById("tip").innerText="Blocked! Outer arrows first";
    el.classList.add("bad");
    setTimeout(()=>el.classList.remove("bad"),350);
    if(hp<=0)setTimeout(()=>show("Game Over","Retry India level."),250);
    return;
  }

  busy=true;
  let dist=board.clientWidth*1.25;
  el.style.transform=`translate(${dx*dist}px,${dy*dist}px)`;
  el.style.opacity="0";

  setTimeout(()=>{
    arrows=arrows.filter(v=>v.id!==id);
    busy=false;
    draw();
    document.getElementById("tip").innerText="India Map • "+arrows.length+" arrows left";
    if(arrows.length===0)show("Level Clear!","India level complete.");
  },190);
}

function show(t,d){
  document.getElementById("mt").innerText=t;
  document.getElementById("md").innerText=d;
  document.getElementById("modal").style.display="flex";
}

function restart(){load()}
function hint(){document.getElementById("tip").innerText="Clear arrows facing outside first."}

window.addEventListener("resize",draw);
load();
</script>
</body>
</html>
